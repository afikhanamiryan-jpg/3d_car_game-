<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Car Game Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; touch-action: none; }
        #cntrl { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(3, 70px); gap: 15px; }
        .b { width: 70px; height: 70px; background: rgba(255,255,255,0.4); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: #fff; user-select: none; }
        #u { grid-column: 2; } #l { grid-column: 1; } #r { grid-column: 3; } #d { grid-column: 2; }
    </style>
</head>
<body>
    <div id="cntrl">
        <div class="b" id="u">↑</div>
        <div class="b" id="l">←</div>
        <div class="b" id="r">→</div>
        <div class="b" id="d">↓</div>
    </div>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
    <script type="module">
        import * as THREE from 'three';
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light, new THREE.AmbientLight(0x404040));
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshPhongMaterial({ color: 0x333333 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground, new THREE.GridHelper(200, 20));
        const car = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 2), new THREE.MeshPhongMaterial({ color: 0xff0000 }));
        body.position.y = 0.25;
        car.add(body);
        scene.add(car);
        const keys = { u: 0, d: 0, l: 0, r: 0 };
        const setupBtn = (id, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); keys[k] = 1; };
            el.ontouchend = (e) => { e.preventDefault(); keys[k] = 0; };
        };
        setupBtn('u', 'u'); setupBtn('d', 'd'); setupBtn('l', 'l'); setupBtn('r', 'r');
        let speed = 0, angle = 0;
        function animate() {
            requestAnimationFrame(animate);
            if (keys.u) speed += 0.005;
            if (keys.d) speed -= 0.005;
            if (keys.l) angle += 0.03;
            if (keys.r) angle -= 0.03;
            speed *= 0.96;
            car.rotation.y = angle;
            car.position.x += Math.sin(angle) * speed;
            car.position.z += Math.cos(angle) * speed;
            camera.position.set(car.position.x - Math.sin(angle) * 7, 4, car.position.z - Math.cos(angle) * 7);
            camera.lookAt(car.position);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
