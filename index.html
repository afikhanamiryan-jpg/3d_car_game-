<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>3D Car Game - Simple Control</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #instructions {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.5); color: white;
            padding: 10px; border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="instructions">
    <b>Կառավարում:</b> Օգտագործիր սլաքները (↑ ↓ ← →) մեքենան վարելու համար
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // 1. Սցենարի ստեղծում
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Երկնագույն

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. Լույս
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7.5).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // 3. Գետին (Ճանապարհ)
    const planeGeometry = new THREE.PlaneGeometry(100, 100);
    const planeMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });
    const ground = new THREE.Mesh(planeGeometry, planeMaterial);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // 4. Մեքենայի ստեղծում (Պարզ մոդել)
    const carGroup = new THREE.Group();

    // Մեքենայի մարմինը
    const bodyGeom = new THREE.BoxGeometry(1, 0.5, 2);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
    const carBody = new THREE.Mesh(bodyGeom, bodyMat);
    carBody.position.y = 0.4;
    carGroup.add(carBody);

    // Անիվներ
    const wheelGeom = new THREE.CylinderGeometry(0.2, 0.2, 0.2, 16);
    const wheelMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
    const wheels = [];
    const wheelPositions = [[-0.6, 0.2, 0.7], [0.6, 0.2, 0.7], [-0.6, 0.2, -0.7], [0.6, 0.2, -0.7]];
    
    wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeom, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(...pos);
        carGroup.add(wheel);
        wheels.push(wheel);
    });

    scene.add(carGroup);

    // 5. Տեսախցիկի դիրքը
    camera.position.set(0, 5, 10);
    camera.lookAt(carGroup.position);

    // 6. Կառավարում
    const keys = { up: false, down: false, left: false, right: false };
    document.addEventListener('keydown', (e) => {
        if(e.key === "ArrowUp") keys.up = true;
        if(e.key === "ArrowDown") keys.down = true;
        if(e.key === "ArrowLeft") keys.left = true;
        if(e.key === "ArrowRight") keys.right = true;
    });
    document.addEventListener('keyup', (e) => {
        if(e.key === "ArrowUp") keys.up = false;
        if(e.key === "ArrowDown") keys.down = false;
        if(e.key === "ArrowLeft") keys.left = false;
        if(e.key === "ArrowRight") keys.right = false;
    });

    // 7. Շարժման տրամաբանություն
    let speed = 0;
    let angle = 0;

    function animate() {
        requestAnimationFrame(animate);

        if (keys.up) speed += 0.005;
        if (keys.down) speed -= 0.005;
        if (keys.left) angle += 0.03;
        if (keys.right) angle -= 0.03;

        // Դանդաղեցում (friction)
        speed *= 0.95;

        carGroup.rotation.y = angle;
        carGroup.position.x += Math.sin(angle) * speed;
        carGroup.position.z += Math.cos(angle) * speed;

        // Տեսախցիկը հետևում է մեքենային
        camera.position.x = carGroup.position.x;
        camera.position.z = carGroup.position.z + 10;
        camera.lookAt(carGroup.position);

        renderer.render(scene, camera);
    }

    animate();

    // Էկրանի չափսի փոփոխություն
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
  </html>
